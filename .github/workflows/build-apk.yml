name: Build APK
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  KS_PASS: grandsilence2026

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurer Bubblewrap (JDK + SDK Android du runner)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME",
            "enableAnalytics": false
          }
          EOF

      - name: Clé de signature (créée au premier lancement, puis committée)
        run: |
          if [ ! -f android.keystore ]; then
            keytool -genkeypair -v -keystore android.keystore -alias android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=Le Grand Silence, OU=Famille, O=Famille, C=BE"
          fi
          FINGERPRINT=$(keytool -list -v -keystore android.keystore -alias android -storepass "$KS_PASS" \
            | grep 'SHA256:' | head -1 | sed 's/.*SHA256: //')
          echo "Empreinte SHA-256 : $FINGERPRINT"
          mkdir -p public/.well-known
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.famille.grandsilence","sha256_cert_fingerprints":["%s"]}}]\n' "$FINGERPRINT" \
            > public/.well-known/assetlinks.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android.keystore public/.well-known/assetlinks.json
          if ! git diff --cached --quiet; then
            git commit -m "APK : clé de signature + assetlinks.json"
            git push
          fi

      - name: Générer le projet Android
        run: bubblewrap update --skipVersionUpgrade < /dev/null

      - name: Construire l'APK signé
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ env.KS_PASS }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ env.KS_PASS }}
        run: bubblewrap build --skipPwaValidation < /dev/null

      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: 'Le Grand Silence — APK (build ${{ github.run_number }})'
          body: |
            📱 **APK Android du Grand Silence**

            1. Télécharger `app-release-signed.apk` ci-dessous sur le téléphone
            2. L'ouvrir et autoriser l'installation depuis des sources inconnues (première fois seulement)
            3. Jouer !

            L'application affiche le jeu en ligne : les mises à jour poussées sur `main`
            arrivent automatiquement, sans réinstaller l'APK.
          files: |
            app-release-signed.apk
            app-release-bundle.aab
